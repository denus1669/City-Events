openapi: 3.0.0
info:
  title: City Events API
  description: API для управления городскими событиями в WordPress (Twenty Twenty-Five theme)
  version: 1.0.0

servers:
  - url: /wp-json/events/v1
    description: Основной эндпоинт API

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key

  schemas:
    Event:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        link:
          type: string
          format: uri
        api_url:
          type: string
          format: uri
        place:
          type: string
        start_at:
          type: string
          example: "2026-05-10 10:00"
        end_at:
          type: string
          example: "2026-05-10 12:00"
        tags:
          type: array
          items:
            type: string
          maxItems: 5
        capacity:
          type: integer
          minimum: 1
          maximum: 5000
        status:
          type: string
          enum: [draft, published, cancelled]
        popularity:
          type: integer
          minimum: 1
          maximum: 5
        change_number:
          type: integer
        recommendation:
          type: string
          description: "Появляется только по вторникам и средам"

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            message:
              type: string
            code:
              type: string

security:
  - ApiKeyAuth: []

paths:
  /test:
    get:
      summary: Проверка работоспособности API
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /events:
    get:
      summary: Получить список событий
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            maximum: 50
        - name: cursor
          in: query
          description: Base64 строка для пагинации
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: place
          in: query
          schema:
            type: string
        - name: min_popularity
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 5
        - name: max_popularity
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 5
        - name: tag
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [soon_and_popular, popularity]
      responses:
        '200':
          description: Список событий с мета-данными
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Event'
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                      per_page:
                        type: integer
                  links:
                    type: object
                    properties:
                      self: { type: string }
                      next: { type: string, nullable: true }
                      prev: { type: string, nullable: true }

    post:
      summary: Создать новое событие
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, place, start_at, end_at, capacity]
              properties:
                title: { type: string }
                place: { type: string }
                start_at: { type: string }
                end_at: { type: string }
                capacity: { type: integer }
                tags: { type: array, items: { type: string } }
                status: { type: string, default: draft }
      responses:
        '201':
          description: Событие создано
          headers:
            Location:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          description: Ошибка логики (например, низкая популярность)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Ошибка валидации полей
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /events/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      summary: Получить событие по ID
      responses:
        '200':
          description: Детали события
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '404':
          description: Событие не найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Обновить событие по ID
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Event'
      responses:
        '200':
          description: Событие обновлено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          description: Ошибка бизнес-логики (дата в прошлом или статус)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Удалить событие по ID
      responses:
        '200':
          description: Успешное удаление
        '403':
          description: Нельзя удалить опубликованное или начавшееся событие
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'